<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetHackFPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; overflow: hidden; cursor: none;
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    #canvases { position: relative; display: inline-block; }
    #game, #ui {
      display: block;
    }
    #ui {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;   /* clicks/pointer-lock fall through to #game */
    }
    #overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7);
      color: #aaa;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      text-align: center;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="canvases">
    <canvas id="game"></canvas>
    <canvas id="ui"></canvas>
  </div>
  <div id="overlay">Click to capture mouse</div>
  <script src="dist/bundle.js"></script>
</body>
</html>
